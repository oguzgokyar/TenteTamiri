      <stop offset="0" stop-color="#F8E4B3"/>
      <stop offset=".48" stop-color="#D6A24C"/>
      <stop offset="1" stop-color="#C46F2A"/>
    </linearGradient>
    <filter id="textShadow" x="-8%" y="-20%" width="116%" height="140%">
